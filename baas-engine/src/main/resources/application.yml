spring:
  application:
    name: baas-engine
  datasource:
    # Production deployments MUST set these env vars. No defaults — a misconfigured
    # deploy that misses DATASOURCE_* should fail to start, NOT silently connect
    # to localhost:5432 with weak default credentials. Local-dev profiles (`local`,
    # `test`) set these via application-<profile>.yml which is gitignored / test-only.
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        multiTenancy: SCHEMA
  flyway:
    enabled: true
    locations: classpath:db/migration/public
    schemas: public
    default-schema: public
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

app:
  # Production deployments MUST set JWT_SECRET and ENCRYPTION_KEY env vars.
  # No defaults — startup fails fast if missing, which is the correct behaviour
  # (default secrets in a public codebase are a security hole).
  jwt:
    secret: ${JWT_SECRET}
    expiry-hours: 24
  encryption:
    key: ${ENCRYPTION_KEY}
  rate-limit:
    sandbox-rpm: 30
    basic-rpm: 100
    pro-rpm: 500
    enterprise-rpm: 2000

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.nubbank.baas: INFO
    org.hibernate.SQL: OFF
