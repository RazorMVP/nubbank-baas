spring:
  application:
    name: baas-engine
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/nubbank_baas}
    username: ${DATASOURCE_USERNAME:baas}
    password: ${DATASOURCE_PASSWORD:baas}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        multiTenancy: SCHEMA
  flyway:
    enabled: true
    locations: classpath:db/migration/public
    schemas: public
    default-schema: public
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

app:
  # Production deployments MUST set JWT_SECRET and ENCRYPTION_KEY env vars.
  # No defaults — startup fails fast if missing, which is the correct behaviour
  # (default secrets in a public codebase are a security hole).
  jwt:
    secret: ${JWT_SECRET}
    expiry-hours: 24
  encryption:
    key: ${ENCRYPTION_KEY}
  rate-limit:
    sandbox-rpm: 30
    basic-rpm: 100
    pro-rpm: 500
    enterprise-rpm: 2000

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.nubbank.baas: INFO
    org.hibernate.SQL: OFF
