# Testcontainers configuration — classpath version.
# tc.host sets the Docker socket for the TestcontainersHostPropertyClientProviderStrategy.
# This strategy is tried before UnixSocketClientProviderStrategy, so it wins when set.
# ~/.docker/run/docker.sock is the Docker Desktop socket that responds correctly to
# the docker-java shaded client inside Testcontainers.
tc.host=unix:///Users/razormvp/.docker/run/docker.sock
ryuk.disabled=true
