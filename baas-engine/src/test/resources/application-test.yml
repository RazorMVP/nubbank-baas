spring:
  datasource:
    # url/username/password are injected at runtime by @DynamicPropertySource in AbstractIntegrationTest
    # using the Testcontainers-managed postgres:16-alpine container.
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 60000
  flyway:
    enabled: true
    locations: classpath:db/migration/public
    schemas: public
    default-schema: public
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: none

# Disable Redis for tests
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

app:
  jwt:
    secret: test-secret-key-that-is-at-least-32-characters-long-for-hmac
    expiry-hours: 1
  encryption:
    key: test-encryption-key-exactly-32c!
  internal-service:
    shared-secret: test-shared-secret-min-32-chars-long-okay
    # baas-card is not running in engine tests; the dedicated Task 12 test uses a mock.
    card-provisioning-enabled: false
    # Dead loopback so the dashboard's best-effort card-stats call fails fast → cardsIssued=null
    # (exercises CardStatsClient's graceful-degradation path without a 5s DNS/connect wait).
    card-base-url: http://127.0.0.1:1
  keycloak:
    admin-issuer: https://auth.nubbank.test/realms/baas-nubbank-admin
