server:
  port: 8082

spring:
  application:
    name: baas-fep

fep:
  tcp-port: ${FEP_TCP_PORT:8583}
  card:
    base-url: ${CARD_BASE_URL:http://baas-card:8081}
  hmac-secret: ${INTERNAL_SERVICE_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.nubbank.baas: INFO
