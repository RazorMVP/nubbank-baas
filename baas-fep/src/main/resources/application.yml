server:
  port: 8082

spring:
  application:
    name: baas-fep
  # FEP authorization audit log (DEF-1C-24). Non-tenant `fep` schema in the shared Postgres.
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration/fep
    schemas: fep
    default-schema: fep
    create-schemas: true
    baseline-on-migrate: true

fep:
  tcp-port: ${FEP_TCP_PORT:8583}
  card:
    base-url: ${CARD_BASE_URL:http://baas-card:8081}
  hmac-secret: ${INTERNAL_SERVICE_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.nubbank.baas: INFO
