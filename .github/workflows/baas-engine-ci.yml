name: baas-engine CI

# Deployment-agnostic build & publish:
#  - Maven build runs on a generic GitHub-hosted Linux runner.
#  - Tests run with Testcontainers (no cloud-provider runtime).
#  - Image published to GitHub Container Registry — pull from any cloud or
#    on-prem cluster. The deploy step is intentionally absent here; deployment
#    happens via kubectl/helmfile/ArgoCD on the target cluster, NOT inside CI.

on:
  push:
    branches: [main]
    paths:
      - 'baas-engine/**'
      - '.github/workflows/baas-engine-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'baas-engine/**'
      - '.github/workflows/baas-engine-ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baas-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: ./mvnw -B test
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: baas-engine/target/surefire-reports/

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tag (lowercase — OCI requires all-lowercase)
        id: img
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          lower_owner=$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "tag=ghcr.io/${lower_owner}/baas-engine" >> "$GITHUB_OUTPUT"
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: baas-engine
          file: baas-engine/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.tag }}:latest
            ${{ steps.img.outputs.tag }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
