name: baas-ncube CI

on:
  push:
    branches: [main]
    paths:
      - 'baas-ncube/**'
      - '.github/workflows/baas-ncube-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'baas-ncube/**'
      - '.github/workflows/baas-ncube-ci.yml'
  workflow_dispatch:

permissions:
  contents: read   # minimum for actions/checkout; jobs that need more declare it explicitly

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baas-ncube
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: ./mvnw -B test
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: surefire-reports
          path: baas-ncube/target/surefire-reports/

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write    # only this job needs to push to GHCR
      id-token: write    # for keyless SLSA provenance attestation
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.img.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tag (lowercase — OCI requires all-lowercase)
        id: img
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          lower_owner=$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "tag=ghcr.io/${lower_owner}/baas-ncube" >> "$GITHUB_OUTPUT"
      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: baas-ncube
          file: baas-ncube/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.tag }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # provenance: SLSA L1 metadata embedded in OCI manifest (unsigned).
          # Task 18 adds `id-token: write` to enable keyless signing → L3 attestation.
          provenance: true
          # sbom: buildx-generated SBOM embedded in OCI manifest — for sigstore/cosign verifiers.
          # A human-readable SPDX JSON artifact is also produced by anchore/sbom-action below.
          sbom: true

  security-scan:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read   # required: Trivy and sbom-action both pull the image from GHCR
    steps:
      # Checkout is required so .trivyignore is present in the workspace —
      # trivy-action treats a missing trivyignores path as fatal and aborts
      # before scanning, which would silently turn off the strict CVE gate.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy scan image for HIGH/CRITICAL CVEs
        uses: aquasecurity/trivy-action@b2933f565dbc598b29947660e66259e3c7bc8561  # v0.20.0
        with:
          image-ref: ${{ needs.build-and-push.outputs.image-tag }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'   # fail the job on any HIGH/CRITICAL finding
          # To suppress a false positive or accept a risk, add the CVE ID to /.trivyignore
          # with an expiry date and link to the risk-acceptance ticket.
          trivyignores: .trivyignore
      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()   # upload even on Trivy failure so findings are visible
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4  # v3
        with:
          sarif_file: trivy-results.sarif
      - name: Generate SBOM (SPDX JSON)
        if: always()   # generate SBOM even when Trivy fails — needed for triage
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ${{ needs.build-and-push.outputs.image-tag }}:${{ github.sha }}
          format: spdx-json
          artifact-name: baas-ncube-sbom-${{ github.sha }}.spdx.json

  pr-security-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Trivy filesystem scan (PR — informational; uploads SARIF for visibility)
        uses: aquasecurity/trivy-action@b2933f565dbc598b29947660e66259e3c7bc8561  # v0.20.0
        with:
          scan-type: fs
          scan-ref: baas-ncube
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          # PR scan is informational only. The image-time scan on push-to-main
          # (security-scan job above) is the strict gate that blocks publishing
          # vulnerable images. Failing the PR on pre-existing transitive CVEs in
          # the dependency tree (which weren't introduced by the PR) creates a
          # treadmill where every PR fights upstream advisories regardless of
          # what it changed. SARIF still uploads for visibility.
          exit-code: '0'
          ignore-unfixed: true   # only act on CVEs with an upstream fix available
          trivyignores: .trivyignore
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4  # v3
        with:
          sarif_file: trivy-results.sarif
