spring:
  application:
    name: baas-ncube

server:
  port: 8082

app:
  internal-service:
    # MUST be overridden in production via INTERNAL_SERVICE_SECRET env var; ≥32 chars; matches baas-engine's value.
    # Default is a dev-only placeholder so local Spring context boots without env-var set.
    shared-secret: ${INTERNAL_SERVICE_SECRET:dev-only-shared-secret-rotate-in-prod-okay}

baas:
  engine:
    base-url: ${BAAS_ENGINE_URL:http://localhost:8080}
  nps:
    endpoint: ${NPS_ENDPOINT:http://localhost:9022}
    member-id: ${NPS_MEMBER_ID:999058}
    bicfi: ${NPS_BICFI:999058}
    institution-name: ${NPS_INSTITUTION_NAME:NubBank BaaS}
    signing:
      enabled: ${NPS_SIGNING_ENABLED:false}
    encryption:
      enabled: ${NPS_ENCRYPTION_ENABLED:false}
    live: ${NPS_LIVE:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.nubbank.baas.ncube: INFO
