# NubBank BaaS — local / on-prem development stack.
#
# Spins up: PostgreSQL 16 + baas-engine + baas-card + baas-ncube + baas-fep.
#
# Usage:
#   cd infrastructure
#   cp .env.example .env  &&  edit .env
#   docker compose up --build
#
# Deployment-agnostic: this file uses only standard Compose syntax
# (no Docker Desktop / Rancher Desktop / cloud-specific extensions).
# Works on Docker, Podman Compose, and Nerdctl.

name: nubbank-baas

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nubbank_baas}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"   # localhost-only; never exposed to LAN
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  baas-engine:
    build:
      context: ../baas-engine
      dockerfile: Dockerfile
    image: baas-engine:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nubbank_baas}
      DATASOURCE_USERNAME: ${POSTGRES_USER}
      DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
    ports:
      - "${BAAS_ENGINE_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health/readiness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  baas-card:
    build:
      context: ../baas-card
      dockerfile: Dockerfile
    image: baas-card:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Card shares the SAME postgres/db as engine — it reads engine's public
      # partner_organizations/partner_api_keys and writes tenant schemas with its
      # own flyway history table (flyway_schema_history_card).
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nubbank_baas}
      DATASOURCE_USERNAME: ${POSTGRES_USER}
      DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
    ports:
      - "${BAAS_CARD_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/actuator/health/readiness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  baas-ncube:
    build:
      context: ../baas-ncube
      dockerfile: Dockerfile
    image: baas-ncube:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nubbank_baas}
      DATASOURCE_USERNAME: ${POSTGRES_USER}
      DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      NPS_ENDPOINT: ${NPS_ENDPOINT:-http://stub.local}          # renamed from NIBSS_NPS_BASE_URL (Task 8)
      NPS_LIVE: ${NPS_LIVE:-false}
      NPS_MEMBER_ID: ${NPS_MEMBER_ID:-999058}
      NPS_BICFI: ${NPS_BICFI:-999058}
      NPS_INSTITUTION_NAME: ${NPS_INSTITUTION_NAME:-NubBank BaaS}
      NPS_SIGNING_ENABLED: ${NPS_SIGNING_ENABLED:-false}
      NPS_ENCRYPTION_ENABLED: ${NPS_ENCRYPTION_ENABLED:-false}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
    ports:
      - "${BAAS_NCUBE_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8082/actuator/health/readiness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  baas-fep:
    build:
      context: ../baas-fep
      dockerfile: Dockerfile
    image: baas-fep:local
    restart: unless-stopped
    # Enabled at Stage 5 when Track-Card's baas-card block merges into this file:
    # depends_on:
    #   baas-card:
    #     condition: service_started
    environment:
      CARD_BASE_URL: http://baas-card:8081
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      # Container listen port — kept in lockstep with the published host port below
      # so overriding BAAS_FEP_TCP_PORT moves both ends together.
      FEP_TCP_PORT: ${BAAS_FEP_TCP_PORT:-8583}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
    ports:
      - "${BAAS_FEP_HTTP_PORT:-8083}:8082"
      - "${BAAS_FEP_TCP_PORT:-8583}:${BAAS_FEP_TCP_PORT:-8583}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8082/actuator/health/readiness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

volumes:
  pgdata:
    driver: local
