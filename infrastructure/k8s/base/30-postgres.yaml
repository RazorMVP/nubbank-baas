# Reference Postgres deployment for environments without a managed DB.
# In a real cloud deployment, replace this with the managed equivalent
# (RDS, Cloud SQL, AlloyDB, Aiven, etc.) and only keep the Service stub
# that points to the external endpoint.

apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: nubbank-baas
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: nubbank-baas
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70           # postgres user in postgres:16-alpine (UID 70 per docker-library/postgres alpine Dockerfile)
        runAsGroup: 70
        fsGroup: 70             # chown mounted volume so postgres can write
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: nubbank_baas
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: baas-engine-secrets
                  key: DATASOURCE_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: baas-engine-secrets
                  key: DATASOURCE_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # postgres writes to /var/run/postgresql, /tmp, etc.
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              memory: "2Gi"   # leave CPU unlimited — DB workloads burst, throttling causes timeouts
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
