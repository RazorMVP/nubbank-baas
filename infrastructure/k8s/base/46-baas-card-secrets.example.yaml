# Example Secret manifest. DO NOT commit a populated version.
#
# In production, generate the Secret from your KMS / SealedSecrets / SOPS / Vault
# operator. The values shown here are placeholders for the keys baas-card reads
# at startup (no defaults — card fails fast if any are missing).
#
# Apply with:
#   kubectl create secret generic baas-card-secrets \
#     --namespace nubbank-baas \
#     --from-literal=DATASOURCE_USERNAME=... \
#     --from-literal=DATASOURCE_PASSWORD=... \
#     --from-literal=JWT_SECRET=... \
#     --from-literal=ENCRYPTION_KEY=... \
#     --from-literal=INTERNAL_SERVICE_SECRET=...
#
# DB ROLE POSTURE: card legitimately needs broad grants — it READS engine's
# public.partner_* tables and WRITES every tenant schema (partner_*/sandbox_*).
# A least-privilege role for card must therefore span all tenant schemas; it is
# NOT scoped like fep's single-schema role. Provision the DB role out of band.
#
# INTERNAL_SERVICE_SECRET is the shared HMAC secret for inter-service auth. It
# MUST equal baas-engine-secrets' value (engine signs the engine→card provisioning
# call; card signs the card→engine debit/credit/lookup calls). ≥32 chars or both
# services refuse to start. Rotation requires a rolling restart of engine + card.

apiVersion: v1
kind: Secret
metadata:
  name: baas-card-secrets
  namespace: nubbank-baas
type: Opaque
stringData:
  DATASOURCE_USERNAME: REPLACE_ME
  DATASOURCE_PASSWORD: REPLACE_ME
  JWT_SECRET: REPLACE_ME_AT_LEAST_32_CHARS
  ENCRYPTION_KEY: REPLACE_ME_AT_LEAST_32_CHARS
  INTERNAL_SERVICE_SECRET: REPLACE_ME_AT_LEAST_32_CHARS
