# PodDisruptionBudgets prevent simultaneous voluntary eviction (kubectl drain,
# node-pool upgrade, autoscaler scale-down) of all replicas of a workload.
#
# minAvailable: 1 semantics:
#   - postgres (1 replica)        → blocks ALL voluntary disruption.
#                                    Operators must do explicit DB failover, not opportunistic drain.
#   - baas-engine + baas-ncube    → under HPA (2–5 typical), permits draining 1 at a time.
#                                    Rolling node-pool upgrades work; simultaneous multi-pod drain
#                                    blocks until rescheduling completes.
#
# Why minAvailable, not maxUnavailable: minAvailable scales with replica count
# (HPA-friendly). maxUnavailable: 0 would block all disruption regardless of count.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: baas-engine-pdb
  namespace: nubbank-baas
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: baas-engine
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: baas-ncube-pdb
  namespace: nubbank-baas
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: baas-ncube
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: nubbank-baas
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: postgres
