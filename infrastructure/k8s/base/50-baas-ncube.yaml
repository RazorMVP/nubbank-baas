apiVersion: apps/v1
kind: Deployment
metadata:
  name: baas-ncube
  namespace: nubbank-baas
  labels:
    app: baas-ncube
    app.kubernetes.io/component: integration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: baas-ncube
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: baas-ncube
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 100          # `app` user in baas-ncube Dockerfile (Alpine `adduser -S` system UID)
        runAsGroup: 101         # `app` group GID — note 101, not 100: GID 100 is Alpine's built-in `users` group, so addgroup -S allocates the next free GID (101)
        fsGroup: 101            # so the /tmp emptyDir is writable by the app user
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: baas-ncube
          # Sentinel tag — does NOT exist in GHCR. Direct `kubectl apply -f base/`
          # fails fast with ImagePullBackOff intentionally. Real deploys go through
          # an overlay: `kubectl apply -k overlays/<env>/` with CI substituting the
          # real SHA via `kustomize edit set image`.
          image: ghcr.io/razormvp/baas-ncube:base-do-not-deploy
          # IfNotPresent is intentional — SHA-tagged production images are immutable,
          # so re-pulling on every restart is wasteful. `Always` would be marginally
          # safer for the sentinel tag but penalises every real rollout.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          envFrom:
            - configMapRef: { name: baas-ncube-config }
            - secretRef:    { name: baas-ncube-secrets }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # startupProbe: gives Flyway/Spring up to 150s (30 × 5s) on cold boot before
          # liveness kicks in. Once succeeds once, kubelet ignores it and runs
          # liveness/readiness on their own schedules.
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: baas-ncube
  namespace: nubbank-baas
spec:
  type: ClusterIP
  selector:
    app: baas-ncube
  ports:
    - port: 80
      targetPort: 8082
      name: http
