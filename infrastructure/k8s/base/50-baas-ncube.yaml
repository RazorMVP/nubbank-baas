apiVersion: apps/v1
kind: Deployment
metadata:
  name: baas-ncube
  namespace: nubbank-baas
  labels:
    app: baas-ncube
    app.kubernetes.io/component: integration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: baas-ncube
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: baas-ncube
    spec:
      containers:
        - name: baas-ncube
          # Sentinel tag — does NOT exist in GHCR. Direct `kubectl apply -f base/`
          # fails fast with ImagePullBackOff intentionally. Real deploys go through
          # an overlay: `kubectl apply -k overlays/<env>/` with CI substituting the
          # real SHA via `kustomize edit set image`.
          image: ghcr.io/razormvp/baas-ncube:base-do-not-deploy
          # IfNotPresent is intentional — SHA-tagged production images are immutable,
          # so re-pulling on every restart is wasteful. `Always` would be marginally
          # safer for the sentinel tag but penalises every real rollout.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          envFrom:
            - configMapRef: { name: baas-engine-config }
            - configMapRef: { name: baas-ncube-config }
            - secretRef:    { name: baas-engine-secrets }
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: baas-ncube
  namespace: nubbank-baas
spec:
  type: ClusterIP
  selector:
    app: baas-ncube
  ports:
    - port: 80
      targetPort: 8082
      name: http
