apiVersion: apps/v1
kind: Deployment
metadata:
  name: baas-engine
  namespace: nubbank-baas
  labels:
    app: baas-engine
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: baas-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: baas-engine
    spec:
      # No imagePullSecrets / nodeSelector / tolerations specified — vanilla
      # k8s only. Provider-specific config (NodeAffinity, PriorityClass, etc.)
      # belongs in a kustomization or Helm values overlay, not in the base.
      containers:
        - name: baas-engine
          # Sentinel tag — does NOT exist in GHCR. Direct `kubectl apply -f base/`
          # fails fast with ImagePullBackOff intentionally. Real deploys go through
          # an overlay: `kubectl apply -k overlays/<env>/` with CI substituting the
          # real SHA via `kustomize edit set image`.
          image: ghcr.io/razormvp/baas-engine:base-do-not-deploy
          # IfNotPresent is intentional — SHA-tagged production images are immutable,
          # so re-pulling on every restart is wasteful. `Always` would be marginally
          # safer for the sentinel tag but penalises every real rollout.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef: { name: baas-engine-config }
            - secretRef:    { name: baas-engine-secrets }
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: baas-engine
  namespace: nubbank-baas
spec:
  type: ClusterIP
  selector:
    app: baas-engine
  ports:
    - port: 80
      targetPort: 8080
      name: http
---
# Horizontal autoscaling — vanilla k8s metrics-server. Cloud-provider-specific
# autoscalers (KEDA, AWS Karpenter) belong in an overlay, not in the base.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: baas-engine
  namespace: nubbank-baas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: baas-engine
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
