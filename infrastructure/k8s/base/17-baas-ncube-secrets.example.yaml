# Template — DO NOT commit a populated version.
#
# baas-ncube-secrets holds only what ncube needs:
#   - DATASOURCE_*          : reserved — ncube has no DB today; provision a SEPARATE
#                             DB user when adding persistence (do NOT reuse engine's creds).
#   - INTERNAL_SERVICE_SECRET : shared with baas-engine for HMAC inter-service auth (≥32 chars).
#   - NPS_SIGNING_KEY       : Phase 2 only — no real signer implementation exists yet.
#                             Setting NPS_SIGNING_ENABLED=true today causes a startup
#                             failure (missing bean). Leave as REPLACE_ME until Phase 2.
#
# It deliberately does NOT include JWT_SECRET or ENCRYPTION_KEY (those are engine-only).
#
# In production, generate via your KMS / SealedSecrets / SOPS / Vault operator.
# Example (manual, for sandbox/dev only):
#   kubectl create secret generic baas-ncube-secrets \
#     --namespace nubbank-baas \
#     --from-literal=DATASOURCE_USERNAME=... \
#     --from-literal=DATASOURCE_PASSWORD=... \
#     --from-literal=INTERNAL_SERVICE_SECRET=...   # MUST match baas-engine-secrets value
#     --from-literal=NPS_SIGNING_KEY=...
#
# INTERNAL_SERVICE_SECRET rotation: the running code holds a single shared-secret value
# (verified — InternalServiceClient.java + InternalServiceAuthFilter.java have no
# legacy/active fallback). Rotation requires updating BOTH secrets to the new value
# and rolling-restarting engine + ncube together. Staged rollout will produce 401s
# between old-engine pods and new-ncube pods (or vice versa) until all pods restart.
apiVersion: v1
kind: Secret
metadata:
  name: baas-ncube-secrets
  namespace: nubbank-baas
type: Opaque
stringData:
  # Reserved — ncube has no DB today. When adding persistence, provision a separate
  # DB user; do NOT reuse engine's credentials.
  DATASOURCE_USERNAME: REPLACE_ME
  DATASOURCE_PASSWORD: REPLACE_ME
  INTERNAL_SERVICE_SECRET: REPLACE_ME_AT_LEAST_32_CHARS
  # Phase 2 only — see header note. Setting NPS_SIGNING_ENABLED=true today crashes ncube startup.
  NPS_SIGNING_KEY: REPLACE_ME
