apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: nubbank-baas

# Secrets are deliberately NOT in this resources list. The *-secrets.example.yaml
# files (baas-engine-secrets, baas-ncube-secrets, baas-card-secrets, baas-fep-secrets)
# are documentation only — their REPLACE_ME values would create useless Secrets in
# the cluster if applied. Real secrets are created out-of-band:
#   kubectl -n nubbank-baas create secret generic baas-engine-secrets \
#     --from-literal=DATASOURCE_USERNAME=... --from-literal=...
#   kubectl -n nubbank-baas create secret generic baas-card-secrets \
#     --from-literal=DATASOURCE_USERNAME=... --from-literal=...
#   kubectl -n nubbank-baas create secret generic baas-fep-secrets \
#     --from-literal=DATASOURCE_USERNAME=... --from-literal=...
#   kubectl -n nubbank-baas create secret generic baas-ncube-secrets \
#     --from-literal=DATASOURCE_USERNAME=... --from-literal=...
# or via SealedSecrets / Vault / external-secrets-operator.
resources:
  - 00-namespace.yaml
  - 16-baas-ncube-config.yaml
  - 20-configmap.yaml
  - 30-postgres.yaml
  - 40-baas-engine.yaml
  - 45-baas-card-config.yaml
  - 47-baas-card.yaml
  - 50-baas-ncube.yaml
  - 60-ingress.yaml
  - 70-baas-fep-config.yaml
  - 72-baas-fep.yaml
