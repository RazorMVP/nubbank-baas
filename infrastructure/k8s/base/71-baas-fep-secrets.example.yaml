# Example Secret manifest. DO NOT commit a populated version.
#
# In production, generate the Secret from your KMS / SealedSecrets / SOPS / Vault
# operator. The values shown here are placeholders for the keys baas-fep reads
# at startup (no defaults — fep fails fast if any are missing).
#
# Apply with:
#   kubectl create secret generic baas-fep-secrets \
#     --namespace nubbank-baas \
#     --from-literal=DATASOURCE_USERNAME=... \
#     --from-literal=DATASOURCE_PASSWORD=... \
#     --from-literal=INTERNAL_SERVICE_SECRET=...
#
# DB ROLE POSTURE: fep touches exactly ONE table in ONE schema
# (fep.authorization_log). Provision a LEAST-PRIVILEGE Postgres role scoped to the
# `fep` schema — do NOT reuse engine's/card's broad credentials. The role needs
# CREATE on the `fep` schema (Flyway create-schemas:true) plus INSERT/SELECT on
# its tables; nothing in public or tenant schemas.
#
# INTERNAL_SERVICE_SECRET is the shared HMAC secret. It MUST equal the value in
# baas-card-secrets (fep signs outbound BIN-lookup + authorize calls to card;
# card validates them). ≥32 chars or both services refuse to start. Rotation
# requires a rolling restart of fep + card together.
#
# It deliberately does NOT include JWT_SECRET or ENCRYPTION_KEY — the FEP has no
# partner-facing JWT auth and no PII-at-rest (it stores only BIN + pan_last4).

apiVersion: v1
kind: Secret
metadata:
  name: baas-fep-secrets
  namespace: nubbank-baas
type: Opaque
stringData:
  DATASOURCE_USERNAME: REPLACE_ME
  DATASOURCE_PASSWORD: REPLACE_ME
  INTERNAL_SERVICE_SECRET: REPLACE_ME_AT_LEAST_32_CHARS
