# Vanilla Kubernetes Ingress — works with any compliant Ingress controller
# (nginx, Traefik, HAProxy, Contour, Kong, AWS ALB Controller, GCP GLB, etc.).
# No annotations specific to a single provider.
#
# To use a specific controller, add its IngressClass via:
#   kubectl annotate ingress baas-engine kubernetes.io/ingress.class=<class>
# or set spec.ingressClassName below.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: baas-engine
  namespace: nubbank-baas
spec:
  # Uncomment + set in your overlay; left empty to remain provider-agnostic.
  # ingressClassName: nginx
  tls:
    - hosts:
        - api.nubbank.example.com  # TODO: replace with real host before deploy
      secretName: baas-engine-tls
  rules:
    - host: api.nubbank.example.com  # TODO: replace with real host before deploy
      http:
        paths:
          # Card's partner API shares the /baas/v1 namespace with engine but owns
          # three disjoint sub-resources. These MORE-SPECIFIC prefixes must precede
          # the engine /baas/v1 catch-all; compliant Ingress controllers route by
          # longest-prefix match, so /baas/v1/cards → card and /baas/v1/<anything
          # else> → engine. Auth is enforced at the service (PartnerContextFilter),
          # not at the edge — the Ingress only routes.
          - path: /baas/v1/cards
            pathType: Prefix
            backend:
              service:
                name: baas-card
                port:
                  number: 80
          - path: /baas/v1/card-products
            pathType: Prefix
            backend:
              service:
                name: baas-card
                port:
                  number: 80
          - path: /baas/v1/bins
            pathType: Prefix
            backend:
              service:
                name: baas-card
                port:
                  number: 80
          - path: /baas/v1
            pathType: Prefix
            backend:
              service:
                name: baas-engine
                port:
                  number: 80
          - path: /open-banking
            pathType: Prefix
            backend:
              service:
                name: baas-ncube
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: baas-backoffice
                port:
                  number: 80
