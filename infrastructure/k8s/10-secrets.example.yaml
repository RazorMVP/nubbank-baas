# Example Secret manifest. DO NOT commit a populated version.
#
# In production, generate the Secret from your KMS / SealedSecrets / SOPS / Vault
# operator. The values shown here are placeholders for the keys baas-engine reads
# at startup.
#
# Apply with:
#   kubectl create secret generic baas-engine-secrets \
#     --namespace nubbank-baas \
#     --from-literal=DATASOURCE_USERNAME=... \
#     --from-literal=DATASOURCE_PASSWORD=... \
#     --from-literal=JWT_SECRET=... \
#     --from-literal=ENCRYPTION_KEY=...

apiVersion: v1
kind: Secret
metadata:
  name: baas-engine-secrets
  namespace: nubbank-baas
type: Opaque
stringData:
  DATASOURCE_USERNAME: REPLACE_ME
  DATASOURCE_PASSWORD: REPLACE_ME
  JWT_SECRET: REPLACE_ME_AT_LEAST_32_CHARS
  ENCRYPTION_KEY: REPLACE_ME_AT_LEAST_32_CHARS
