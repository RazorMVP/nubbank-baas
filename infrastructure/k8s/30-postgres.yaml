# Reference Postgres deployment for environments without a managed DB.
# In a real cloud deployment, replace this with the managed equivalent
# (RDS, Cloud SQL, AlloyDB, Aiven, etc.) and only keep the Service stub
# that points to the external endpoint.

apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: nubbank-baas
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: nubbank-baas
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: nubbank_baas
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: baas-engine-secrets
                  key: DATASOURCE_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: baas-engine-secrets
                  key: DATASOURCE_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
