---
# Default-deny: all pods in nubbank-baas accept no ingress and have no egress
# unless an explicit allow rule is matched below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: nubbank-baas
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# Allow: ingress controller → baas-engine
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-engine
  namespace: nubbank-baas
spec:
  podSelector: { matchLabels: { app: baas-engine } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { name: ingress-nginx } }
      ports:
        - protocol: TCP
          port: 8080
---
# Allow: baas-engine → postgres
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-engine-to-postgres
  namespace: nubbank-baas
spec:
  podSelector: { matchLabels: { app: postgres } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: baas-engine } }
      ports:
        - protocol: TCP
          port: 5432
---
# Allow: baas-engine → baas-ncube (port 8082, NOT 8081 per plan; verified against application.yml + Dockerfile)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-engine-to-ncube
  namespace: nubbank-baas
spec:
  podSelector: { matchLabels: { app: baas-ncube } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: baas-engine } }
      ports:
        - protocol: TCP
          port: 8082
---
# Allow: baas-ncube → external (NIBSS) on 443. DNS allowed via kube-system.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ncube-egress
  namespace: nubbank-baas
spec:
  podSelector: { matchLabels: { app: baas-ncube } }
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: { matchLabels: { name: kube-system } }
      ports:
        - protocol: UDP
          port: 53
    - to: []   # any external IP (NIBSS) — empty list means "match all" per K8s NetworkPolicy spec
      ports:
        - protocol: TCP
          port: 443
---
# Allow: baas-engine egress (DNS, postgres, ncube on 8082)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-engine-egress
  namespace: nubbank-baas
spec:
  podSelector: { matchLabels: { app: baas-engine } }
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: { matchLabels: { name: kube-system } }
      ports:
        - protocol: UDP
          port: 53
    - to:
        - podSelector: { matchLabels: { app: postgres } }
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector: { matchLabels: { app: baas-ncube } }
      ports:
        - protocol: TCP
          port: 8082
